components:
  schemas:
    UserCreateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 250
          minLength: 2
        surname:
          type: string
          maxLength: 250
          minLength: 2
        email:
          type: string
          format: email
          minLength: 1
        age:
          type: integer
          format: int32
          maximum: 120
          minimum: 18
        password:
          type: string
          maxLength: 255
          minLength: 6
      required:
      - age
      - email
      - name
      - password
      - surname
    RequestResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - PENDING
          - APPROVED
          - REJECTED
    SelfPaymentRequest:
      type: object
      properties:
        senderCardId:
          type: integer
          format: int64
        receiverCardId:
          type: integer
          format: int64
        transferAmount:
          type: number
      required:
      - receiverCardId
      - senderCardId
      - transferAmount
    CardCreateRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - email
      - password
    AuthResponse:
      type: object
      properties:
        token:
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        surname:
          type: string
        age:
          type: integer
          format: int32
        role:
          type: string
          enum:
          - USER
          - ADMIN
    CardResponse:
      type: object
      properties:
        maskedCardNumber:
          type: string
        expirationDate:
          type: string
          format: date
        balance:
          type: number
        ownerName:
          type: string
        ownerSurname:
          type: string
        cardStatus:
          type: string
          enum:
          - ACTIVE
          - EXPIRED
          - BLOCKED
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
