databaseChangeLog:
  - changeSet:
      id: create-card-requests-table
      author: igor
      changes:
        - createTable:
            tableName: card_requests
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(10)
                  constraints:
                    nullable: false