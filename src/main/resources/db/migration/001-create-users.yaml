databaseChangeLog:
  - changeSet:
      id: 1
      author: igor
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: surname
                  type: VARCHAR(255)
              - column:
                  name: age
                  type: INT
              - column:
                  name: role
                  type: VARCHAR(50)
