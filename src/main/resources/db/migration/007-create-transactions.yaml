databaseChangeLog:
  - changeSet:
      id: 007-create-transactions
      author: igor
      changes:

        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: sender_card_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: receiver_card_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: sender_card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_transactions_sender_card

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: receiver_card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_transactions_receiver_card